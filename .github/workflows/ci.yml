name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.decide.outputs.api }}
      api_changed: ${{ steps.filter.outputs.api }}
      reason_api: ${{ steps.decide.outputs.reason_api }}
      global: ${{ steps.filter.outputs.global }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'apps/api/**'
            shared:
              - 'packages/shared-types/**'
            global:
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - '.github/workflows/**'

      - name: Decide impacted pipelines
        id: decide
        run: |
          API=false
          REASON_API="No matching changes"

          if [[ "${{ steps.filter.outputs.global }}" == 'true' ]]; then
            API=true
            REASON_API="Global/root CI files changed"
          else
            if [[ "${{ steps.filter.outputs.api }}" == 'true' ]]; then
              API=true
              REASON_API="apps/api changed"
            fi

            if [[ "${{ steps.filter.outputs.shared }}" == 'true' ]]; then
              API=true
              REASON_API="packages/shared-types changed"
            fi
          fi

          {
            echo "api=$API"
            echo "reason_api=$REASON_API"
          } >> "$GITHUB_OUTPUT"

  api:
    runs-on: ubuntu-latest
    needs: prepare
    if: needs.prepare.outputs.api == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Get pnpm store path
        id: pnpm-store
        run: echo "path=$(pnpm store path --silent)" >> "$GITHUB_OUTPUT"

      - name: Cache pnpm store
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-store.outputs.path }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile=false

      - name: Build shared-types (impact dependency)
        run: pnpm --filter @gh-skeleton/shared-types build

      - name: Generate Prisma Client
        run: pnpm --filter gh-skeleton-api exec prisma generate

      - name: Lint API
        run: pnpm --filter gh-skeleton-api lint

      - name: Test API
        run: pnpm --filter gh-skeleton-api test

      - name: Build API
        run: pnpm --filter gh-skeleton-api build

      - name: Cache API build artifacts
        uses: actions/cache@v4
        with:
          path: apps/api/dist
          key: ${{ runner.os }}-api-dist-${{ github.sha }}

  deploy-api:
    name: Deploy API to VPS
    runs-on: ubuntu-latest
    needs: [prepare, api]
    if: |
      github.event_name == 'push' &&
      (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') &&
      needs.prepare.outputs.api == 'true'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_PORT || 22 }}
          script: |
            echo "=== SSH Session Started ==="
            cd ${{ secrets.DEPLOY_PATH || '$HOME/devbox/workspace/umkm-pos' }}
            
            echo "[INFO] Fetching latest changes from Git..."
            git fetch --all
            git reset --hard origin/main
            
            echo "[INFO] Executing deployment script..."
            ./apps/api/deploy.sh --mode docker --skip-tests
            
            echo "=== SSH Session Completed ==="

  summary:
    runs-on: ubuntu-latest
    needs: [prepare, api, deploy-api]
    if: always()
    steps:
      - name: CI selective execution summary
        run: |
          {
            echo "## CI Selective Execution Summary"
            echo ""
            echo "| Area | Changed | Executed | Reason |"
            echo "|------|---------|----------|--------|"
            echo "| api | ${{ needs.prepare.outputs.api_changed }} | ${{ needs.prepare.outputs.api }} | ${{ needs.prepare.outputs.reason_api }} |"
            echo "| shared-types | ${{ needs.prepare.outputs.shared }} | n/a (impact rule) | Triggers api |"
            echo "| global/root | ${{ needs.prepare.outputs.global }} | full CI | Triggers api |"
            echo ""
            echo "### Job results"
            echo "- api job: ${{ needs.api.result || 'skipped' }}"
            echo "- deploy-api job: ${{ needs.deploy-api.result || 'skipped' }}"
          } >> "$GITHUB_STEP_SUMMARY"
